<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
            color:white;
            overflow:hidden;
        }

        .card{
            text-align:center;
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(12px);
            padding:40px;
            border-radius:20px;
            width:90%;
            max-width:420px;
            box-shadow:0 20px 50px rgba(0,0,0,.35);
        }

        h1{
            font-size:30px;
            margin-bottom:10px;
        }

        p{
            color:#cbd5e1;
            margin-bottom:20px;
            line-height:1.6;
        }

        .loader{
            width:60px;
            height:60px;
            border:6px solid rgba(255,255,255,.2);
            border-top:6px solid #38bdf8;
            border-radius:50%;
            margin:20px auto;
            animation:spin 1s linear infinite;
        }

        @keyframes spin{
            to{
                transform:rotate(360deg);
            }
        }

        a{
            display:inline-block;
            margin-top:20px;
            padding:12px 28px;
            border-radius:10px;
            background:#38bdf8;
            color:white;
            text-decoration:none;
            font-weight:bold;
            transition:.3s;
        }

        a:hover{
            background:#0ea5e9;
            transform:translateY(-2px);
        }

        small{
            display:block;
            margin-top:18px;
            color:#94a3b8;
        }
    </style>

    <script>
        const fileUrl = "https://drive.google.com/file/d/1y0G8E2hytApHSp1zzK2Tmns9jjaEkTPQ/view?usp=sharing";

        window.onload = function () {
            document.getElementById("openFile").href = fileUrl;

            setTimeout(() => {
                window.location.href = fileUrl;
            }, 2000);
        };
    </script>
</head>
<body>

<div class="card">
    <div class="loader"></div>

    <h1>Redirecting...</h1>

    <p>
        Please wait while we take you to the latest file.
    </p>

    <a id="openFile" href="#">
        Open File Now
    </a>

    <small>
        Redirecting automatically in 2 seconds...
    </small>
</div>

</body>
</html>
